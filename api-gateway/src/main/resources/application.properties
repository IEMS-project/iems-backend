server.port=${SERVER_PORT:8080}
spring.application.name=api-gateway
spring.config.import=optional:file:deploy/.env.gateway[.properties],optional:file:../deploy/.env.gateway[.properties],optional:file:iems-backend/deploy/.env.gateway[.properties]
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

# User service routes now point to IAM-SERVICE (merged)
spring.cloud.gateway.server.webmvc.routes[0].id=user-service-redirect
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://IAM-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/user-service/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webmvc.routes[1].id=iam-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://IAM-SERVICE
