# Server Configuration
server.port=${SERVER_PORT:8086}
spring.application.name=iam-service
spring.config.import=optional:file:deploy/.env.iam[.properties],optional:file:../deploy/.env.iam[.properties],optional:file:iems-backend/deploy/.env.iam[.properties]

# Database Configuration - Merged with user-db
# IAM database for authentication and authorization
spring.datasource.url=${DB_URL:${IAM_DB_URL}}
spring.datasource.username=${DB_USERNAME:${IAM_DB_USERNAME}}
spring.datasource.password=${DB_PASSWORD:${IAM_DB_PASSWORD}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA Configuration
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Eureka Configuration
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Cache account enabled/locked status in IAM auth filter to avoid a DB lookup on every request.
iam.account-status-cache.ttl-seconds=30

# Logging Configuration
logging.level.com.iems.iamservice=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}
google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:5173/login}

# GitHub OAuth
github.client-id=${GITHUB_CLIENT_ID:}
github.client-secret=${GITHUB_CLIENT_SECRET:}
github.redirect-uri=${GITHUB_REDIRECT_URI:http://localhost:5173/login}

# payOS
payos.client-id=${PAYOS_CLIENT_ID:}
payos.api-key=${PAYOS_API_KEY:}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:}
payos.bank-name=${PAYOS_BANK_NAME:}
payos.account-name=${PAYOS_ACCOUNT_NAME:}
payos.account-number=${PAYOS_ACCOUNT_NUMBER:}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.backend-url=${APP_BACKEND_URL:http://localhost:8080}
