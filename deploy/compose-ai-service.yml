services:
  ai-service:
    image: pthngws/ai-service:latest
    container_name: ai-service
    restart: unless-stopped
    ports:
      - "8091:8091"
    environment:
      SERVER_PORT: 8091
      SPRING_APPLICATION_NAME: ai-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "true"
      EUREKA_CLIENT_FETCH_REGISTRY: "true"

      MONGODB_URI: ${AI_MONGODB_URI:?AI_MONGODB_URI is required}
      MONGODB_DATABASE: ${AI_MONGODB_DATABASE:-iems-ai}

      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}
      OPENROUTER_API_KEYS: ${OPENROUTER_API_KEYS:-}
      OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER:-http://13-211-168-164.nip.io}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-IEMS AI Service}
      OPENROUTER_CHAT_MODEL: ${OPENROUTER_CHAT_MODEL:-openrouter/free}
      OPENROUTER_VISION_MODEL: ${OPENROUTER_VISION_MODEL:-openrouter/free}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL:-nvidia/llama-nemotron-embed-vl-1b-v2:free}
      AI_AGENT_PROJECT_BASE_URL: http://api-gateway:8080/project-service
      AI_UPLOAD_MAX_FILE_SIZE: ${AI_UPLOAD_MAX_FILE_SIZE:-20MB}
      AI_UPLOAD_MAX_REQUEST_SIZE: ${AI_UPLOAD_MAX_REQUEST_SIZE:-25MB}
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: "false"
    networks:
      - iems-network

networks:
  iems-network:
    external: true
