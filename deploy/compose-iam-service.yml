services:
  iam-service:
    image: pthngws/iam-service:latest
    container_name: iam-service
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: 8086
      SPRING_APPLICATION_NAME: iam-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "true"
      EUREKA_CLIENT_FETCH_REGISTRY: "true"

      DB_URL: ${DB_URL:?DB_URL is required}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}

      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION: 86400000
      JWT_REFRESH_EXPIRATION: 604800000

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is required}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRET is required}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://13-211-168-164.nip.io/login}

      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:?GITHUB_CLIENT_ID is required}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:?GITHUB_CLIENT_SECRET is required}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://13-211-168-164.nip.io/login}

      PAYOS_CLIENT_ID: ${PAYOS_CLIENT_ID:?PAYOS_CLIENT_ID is required}
      PAYOS_API_KEY: ${PAYOS_API_KEY:?PAYOS_API_KEY is required}
      PAYOS_CHECKSUM_KEY: ${PAYOS_CHECKSUM_KEY:?PAYOS_CHECKSUM_KEY is required}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://13-211-168-164.nip.io}
      APP_BACKEND_URL: ${APP_BACKEND_URL:-http://13.211.168.164:8080}
      PAYOS_BANK_NAME: MB Bank
      PAYOS_ACCOUNT_NAME: TRAN PHI THANG
      PAYOS_ACCOUNT_NUMBER: 020701010204
    networks:
      - iems-network

networks:
  iems-network:
    external: true
