services:
  document-service:
    image: pthngws/document-service:latest
    container_name: document-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      SPRING_APPLICATION_NAME: document-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "true"
      EUREKA_CLIENT_FETCH_REGISTRY: "true"

      DB_URL: ${DOCUMENT_DB_URL:?DOCUMENT_DB_URL is required}
      DB_USERNAME: ${DOCUMENT_DB_USERNAME:?DOCUMENT_DB_USERNAME is required}
      DB_PASSWORD: ${DOCUMENT_DB_PASSWORD:?DOCUMENT_DB_PASSWORD is required}

      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}

      AWS_S3_BUCKET: ${AWS_S3_BUCKET:?AWS_S3_BUCKET is required}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT:-}
      AWS_S3_PUBLIC_BASE_URL: ${AWS_S3_PUBLIC_BASE_URL:-}
      AWS_S3_PRESIGNED_URL_EXPIRATION_MINUTES: ${AWS_S3_PRESIGNED_URL_EXPIRATION_MINUTES:-15}
      AWS_S3_PATH_STYLE_ACCESS: ${AWS_S3_PATH_STYLE_ACCESS:-false}

      DOCUMENT_UPLOAD_MAX_FILE_SIZE: ${DOCUMENT_UPLOAD_MAX_FILE_SIZE:-2GB}
      DOCUMENT_UPLOAD_MAX_REQUEST_SIZE: ${DOCUMENT_UPLOAD_MAX_REQUEST_SIZE:-2100MB}
      FEIGN_CONNECT_TIMEOUT_MS: ${FEIGN_CONNECT_TIMEOUT_MS:-3000}
      FEIGN_READ_TIMEOUT_MS: ${FEIGN_READ_TIMEOUT_MS:-5000}
    networks:
      - iems-network

networks:
  iems-network:
    external: true
