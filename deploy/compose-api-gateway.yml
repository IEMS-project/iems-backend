services:
  api-gateway:
    image: pthngws/api-gateway:latest
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_APPLICATION_NAME: api-gateway
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:8083,https://iems.io.vn,https://www.iems.io.vn,http://iems.io.vn,http://www.iems.io.vn,http://32-236-226-233.nip.io,http://32-236-226-233.nip.io:80,http://ec2-32-236-226-233.ap-southeast-2.compute.amazonaws.com,http://ec2-32-236-226-233.ap-southeast-2.compute.amazonaws.com:80,http://32.236.226.233,http://32.236.226.233:80}
    networks:
      - iems-network

networks:
  iems-network:
    external: true
