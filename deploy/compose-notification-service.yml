services:
  notification-service:
    image: pthngws/notification-service:latest
    container_name: notification-service
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      SERVER_PORT: 8090
      SPRING_APPLICATION_NAME: notification-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "true"
      EUREKA_CLIENT_FETCH_REGISTRY: "true"

      DB_URL: ${NOTIFICATION_DB_URL:?NOTIFICATION_DB_URL is required}
      DB_USERNAME: ${NOTIFICATION_DB_USERNAME:?NOTIFICATION_DB_USERNAME is required}
      DB_PASSWORD: ${NOTIFICATION_DB_PASSWORD:?NOTIFICATION_DB_PASSWORD is required}

      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}

      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:?MAIL_USERNAME is required}
      MAIL_PASSWORD: ${MAIL_PASSWORD:?MAIL_PASSWORD is required}
      FRONTEND_URL: ${APP_FRONTEND_URL:-http://13-211-168-164.nip.io}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-true}
      APP_IAM_SERVICE_URL: http://iam-service:8086
    networks:
      - iems-network

networks:
  iems-network:
    external: true
