name: Reusable Backend Service Deploy

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      image:
        required: true
        type: string
      compose_file:
        required: true
        type: string
      env_file:
        required: false
        type: string
        default: ""
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      EC2_HOST:
        required: true
      EC2_USER:
        required: true
      EC2_SSH_KEY:
        required: true

permissions:
  contents: read

jobs:
  build-push-deploy:
    name: Build, push and deploy ${{ inputs.service }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build service jar
        run: |
          chmod +x mvnw
          ./mvnw -pl ${{ inputs.service }} -am package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ inputs.service }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image }}:${{ github.sha }}

      - name: Copy compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: deploy/${{ inputs.compose_file }}
          target: ~/iems-backend

      - name: Deploy service on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/iems-backend/deploy

            COMPOSE_ENV=""
            if [ -n "${{ inputs.env_file }}" ]; then
              COMPOSE_ENV="--env-file ${{ inputs.env_file }}"
            fi

            sudo docker network create iems-network || true
            sudo docker compose $COMPOSE_ENV -f ${{ inputs.compose_file }} pull ${{ inputs.service }}
            sudo docker compose $COMPOSE_ENV -f ${{ inputs.compose_file }} up -d --force-recreate ${{ inputs.service }}
            sudo docker image prune -f
