name: Deploy AI Service

on:
  push:
    branches:
      - main
    paths:
      - 'ai-service/**'
      - 'pom.xml'
      - 'compose.yml'
      - '.github/workflows/deploy-ai-service.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    environment: aws_deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: chmod +x mvnw && ./mvnw clean package -pl ai-service -am -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: true
          tags: ${{ vars.DOCKER_USERNAME }}/ai-service:latest,${{ vars.DOCKER_USERNAME }}/ai-service:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: aws_deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "compose.yml"
          target: "~/iems/ai-service"

      - name: Execute remote ssh commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/iems/ai-service

            cat > ~/iems/ai-service/.env << EOF
            SERVICE_NAME=ai-service
            IMAGE_NAME=${{ vars.DOCKER_USERNAME }}/ai-service:latest
            HOST_PORT=8092
            CONTAINER_PORT=8091
            EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
            SPRING_DATA_MONGODB_URI=${{ secrets.AI_MONGODB_URI }}
            SPRING_DATA_MONGODB_DATABASE=${{ vars.AI_MONGODB_DATABASE }}
            AI_OLLAMA_BASE_URL=${{ vars.OLLAMA_BASE_URL }}
            AI_OLLAMA_MODEL=${{ vars.OLLAMA_MODEL }}
            AI_OLLAMA_EMBEDDING_MODEL=${{ vars.OLLAMA_EMBEDDING_MODEL }}
            AI_AGENT_PROJECT_BASE_URL=http://api-gateway:8080/project-service
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EOF

            chmod 600 ~/iems/ai-service/.env
            cd ~/iems/ai-service

            docker network create iems-network || true
            docker compose pull
            docker compose up -d --remove-orphans

            docker image prune -f
            echo "AI service deployment completed!"
