name: Deploy Chat Service

on:
  push:
    branches:
      - main
    paths:
      - 'chat-service/**'
      - '.github/workflows/deploy-chat-service.yml'

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    environment: aws_deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: chmod +x mvnw && ./mvnw clean package -pl chat-service -am -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./chat-service
          push: true
          tags: ${{ vars.DOCKER_USERNAME }}/chat-service:latest,${{ vars.DOCKER_USERNAME }}/chat-service:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: aws_deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        continue-on-error: true
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "compose.yml"
          target: "~/iems/chat-service"

      - name: Execute remote ssh commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/iems/chat-service
            
            cat > ~/iems/chat-service/.env << EOF
            MONGODB_URI=${{ secrets.CHAT_MONGODB_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }}
            JWT_REFRESH_EXPIRATION=${{ secrets.JWT_REFRESH_EXPIRATION }}
            EOF
            
            chmod 600 ~/iems/chat-service/.env
            cd ~/iems/chat-service
            
            docker network create iems-network || true
            docker compose pull || true
            docker compose up -d --remove-orphans || true
            
            docker image prune -f
            echo "Deployment completed!"
