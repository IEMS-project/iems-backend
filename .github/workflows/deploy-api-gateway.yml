name: Deploy API Gateway

on:
  push:
    branches:
      - main
    paths:
      - 'api-gateway/**'
      - 'pom.xml'
      - 'compose.yml'
      - '.github/workflows/deploy-api-gateway.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    environment: aws_deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: chmod +x mvnw && ./mvnw clean package -pl api-gateway -am -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ${{ vars.DOCKER_USERNAME }}/api-gateway:latest,${{ vars.DOCKER_USERNAME }}/api-gateway:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: aws_deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "compose.yml"
          target: "~/iems/api-gateway"

      - name: Execute remote ssh commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/iems/api-gateway

            cat > ~/iems/api-gateway/.env << EOF
            SERVICE_NAME=api-gateway
            IMAGE_NAME=${{ vars.DOCKER_USERNAME }}/api-gateway:latest
            HOST_PORT=8080
            CONTAINER_PORT=8080
            EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
            EOF

            chmod 600 ~/iems/api-gateway/.env
            cd ~/iems/api-gateway

            docker network create iems-network || true
            docker compose pull
            docker compose up -d --remove-orphans

            docker image prune -f
            echo "API gateway deployment completed!"
