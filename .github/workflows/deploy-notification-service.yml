name: Deploy Notification Service

on:
  push:
    branches:
      - main
    paths:
      - 'notification-service/**'
      - 'pom.xml'
      - 'compose.yml'
      - '.github/workflows/deploy-notification-service.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    environment: aws_deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: chmod +x mvnw && ./mvnw clean package -pl notification-service -am -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          push: true
          tags: ${{ vars.DOCKER_USERNAME }}/notification-service:latest,${{ vars.DOCKER_USERNAME }}/notification-service:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: aws_deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "compose.yml"
          target: "~/iems/notification-service"

      - name: Execute remote ssh commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/iems/notification-service

            cat > ~/iems/notification-service/.env << EOF
            SERVICE_NAME=notification-service
            IMAGE_NAME=${{ vars.DOCKER_USERNAME }}/notification-service:latest
            HOST_PORT=8090
            CONTAINER_PORT=8090
            EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
            DB_URL=${{ secrets.NOTIFICATION_DB_URL }}
            DB_USERNAME=${{ secrets.NOTIFICATION_DB_USERNAME }}
            DB_PASSWORD=${{ secrets.NOTIFICATION_DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }}
            JWT_REFRESH_EXPIRATION=${{ secrets.JWT_REFRESH_EXPIRATION }}
            MAIL_HOST=${{ vars.MAIL_HOST }}
            MAIL_PORT=${{ vars.MAIL_PORT }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            FRONTEND_URL=${{ vars.APP_FRONTEND_URL }}
            EMAIL_ENABLED=${{ vars.EMAIL_ENABLED }}
            EOF

            chmod 600 ~/iems/notification-service/.env
            cd ~/iems/notification-service

            docker network create iems-network || true
            docker compose pull
            docker compose up -d --remove-orphans

            docker image prune -f
            echo "Notification service deployment completed!"
