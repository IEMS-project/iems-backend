name: Deploy IAM Service

on:
  push:
    branches:
      - main
    paths:
      - 'iam-service/**'
      - 'pom.xml'
      - 'compose.yml'
      - '.github/workflows/deploy-iam-service.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    environment: aws_deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: chmod +x mvnw && ./mvnw clean package -pl iam-service -am -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./iam-service
          push: true
          tags: ${{ vars.DOCKER_USERNAME }}/iam-service:latest,${{ vars.DOCKER_USERNAME }}/iam-service:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: aws_deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "compose.yml"
          target: "~/iems/iam-service"

      - name: Execute remote ssh commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/iems/iam-service

            cat > ~/iems/iam-service/.env << EOF
            SERVICE_NAME=iam-service
            IMAGE_NAME=${{ vars.DOCKER_USERNAME }}/iam-service:latest
            HOST_PORT=8086
            CONTAINER_PORT=8086
            EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
            DB_URL=${{ secrets.IAM_DB_URL }}
            DB_USERNAME=${{ secrets.IAM_DB_USERNAME }}
            DB_PASSWORD=${{ secrets.IAM_DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }}
            JWT_REFRESH_EXPIRATION=${{ secrets.JWT_REFRESH_EXPIRATION }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}
            GITHUB_CLIENT_ID=${{ secrets.GITHUB_CLIENT_ID }}
            GITHUB_CLIENT_SECRET=${{ secrets.GITHUB_CLIENT_SECRET }}
            GITHUB_REDIRECT_URI=${{ secrets.GITHUB_REDIRECT_URI }}
            PAYOS_CLIENT_ID=${{ secrets.PAYOS_CLIENT_ID }}
            PAYOS_API_KEY=${{ secrets.PAYOS_API_KEY }}
            PAYOS_CHECKSUM_KEY=${{ secrets.PAYOS_CHECKSUM_KEY }}
            PAYOS_BANK_NAME=${{ secrets.PAYOS_BANK_NAME }}
            PAYOS_ACCOUNT_NAME=${{ secrets.PAYOS_ACCOUNT_NAME }}
            PAYOS_ACCOUNT_NUMBER=${{ secrets.PAYOS_ACCOUNT_NUMBER }}
            APP_FRONTEND_URL=${{ vars.APP_FRONTEND_URL }}
            APP_BACKEND_URL=${{ vars.APP_BACKEND_URL }}
            EOF

            chmod 600 ~/iems/iam-service/.env
            cd ~/iems/iam-service

            docker network create iems-network || true
            docker compose pull
            docker compose up -d --remove-orphans

            docker image prune -f
            echo "IAM service deployment completed!"
