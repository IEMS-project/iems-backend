server.port=8091
spring.application.name=ai-service
spring.config.import=optional:file:.env[.properties],optional:file:ai-service/.env[.properties],optional:file:iems-backend/ai-service/.env[.properties]
spring.servlet.multipart.max-file-size=${AI_UPLOAD_MAX_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${AI_UPLOAD_MAX_REQUEST_SIZE:25MB}

# Local development hot reload
spring.devtools.restart.enabled=${SPRING_DEVTOOLS_RESTART_ENABLED:true}
spring.devtools.livereload.enabled=${SPRING_DEVTOOLS_LIVERELOAD_ENABLED:true}
spring.devtools.restart.poll-interval=${SPRING_DEVTOOLS_POLL_INTERVAL:1s}
spring.devtools.restart.quiet-period=${SPRING_DEVTOOLS_QUIET_PERIOD:400ms}
spring.devtools.restart.exclude=static/**,public/**,templates/**,META-INF/maven/**,logs/**,uploads/**

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/ai-db}
spring.data.mongodb.database=${MONGODB_DATABASE:iems-ai}

# OpenRouter settings
ai.openrouter.base-url=https://openrouter.ai/api/v1
ai.openrouter.api-key=${OPENROUTER_API_KEY:}
ai.openrouter.http-referer=${OPENROUTER_HTTP_REFERER:}
ai.openrouter.title=${OPENROUTER_APP_TITLE:IEMS AI Service}
ai.openrouter.model=${OPENROUTER_CHAT_MODEL:openrouter/free}
ai.openrouter.vision-model=${OPENROUTER_VISION_MODEL:openrouter/free}
ai.openrouter.embedding-model=${OPENROUTER_EMBEDDING_MODEL:nvidia/llama-nemotron-embed-vl-1b-v2:free}
ai.openrouter.system-prompt-file=classpath:prompts/systemt_prompt.txt
ai.openrouter.temperature=0.2
ai.openrouter.retrieval-top-k=6
ai.openrouter.chunk-size=900
ai.openrouter.chunk-overlap=150

# Agent settings
ai.agent.max-plan-steps=3
ai.agent.project-base-url=http://localhost:8080/project-service

# JWT settings (same signing key as other services)
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

management.endpoints.web.exposure.include=health,info
