server.port=8091
spring.application.name=ai-service

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# MongoDB
spring.data.mongodb.uri=mongodb+srv://admin:adminiems@cluster0.sltfsro.mongodb.net/
spring.data.mongodb.database=iems-ai

# Ollama settings
ai.ollama.base-url=http://localhost:11434
ai.ollama.model=qwen2.5:14b
ai.ollama.embedding-model=qwen2.5:14b
ai.ollama.system-prompt-file=classpath:prompts/systemt_prompt.txt
