server.port=8099
spring.application.name=chat-service


# MongoDB
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=iems-chat

#spring.data.mongodb.uri=mongodb://localhost:27017
#spring.data.mongodb.database=chat-db
# WebSocket message broker tuning (optional defaults are fine)
spring.websocket.messages.simp.enabled=true

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.springframework.messaging=INFO


# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}

# Multipart size limits to forward big uploads to document-service
spring.servlet.multipart.max-file-size=60MB
spring.servlet.multipart.max-request-size=70MB