spring.application.name=document-service
server.port=8085
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.leak-detection-threshold=60000

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

storage.s3.bucket=${AWS_S3_BUCKET:${STORAGE_BUCKET_NAME:}}
storage.s3.region=${AWS_REGION:${STORAGE_S3_REGION:ap-southeast-1}}
storage.s3.access-key=${AWS_ACCESS_KEY_ID:${STORAGE_S3_ACCESS_KEY:}}
storage.s3.secret-key=${AWS_SECRET_ACCESS_KEY:${STORAGE_S3_SECRET_KEY:}}
storage.s3.session-token=${AWS_SESSION_TOKEN:${STORAGE_S3_SESSION_TOKEN:}}
storage.s3.endpoint=${AWS_S3_ENDPOINT:${STORAGE_S3_ENDPOINT:}}
storage.s3.public-base-url=${AWS_S3_PUBLIC_BASE_URL:${STORAGE_S3_PUBLIC_BASE_URL:}}
storage.s3.presigned-url-expiration-minutes=${AWS_S3_PRESIGNED_URL_EXPIRATION_MINUTES:${STORAGE_S3_PRESIGNED_URL_EXPIRATION_MINUTES:15}}
storage.s3.path-style-access=${AWS_S3_PATH_STYLE_ACCESS:${STORAGE_S3_PATH_STYLE_ACCESS:false}}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}

# Multipart size limits
spring.servlet.multipart.max-file-size=${DOCUMENT_UPLOAD_MAX_FILE_SIZE:2GB}
spring.servlet.multipart.max-request-size=${DOCUMENT_UPLOAD_MAX_REQUEST_SIZE:2100MB}
spring.servlet.multipart.file-size-threshold=2MB

# OpenFeign defensive defaults for cross-service permission/user calls
spring.cloud.openfeign.client.config.default.connectTimeout=${FEIGN_CONNECT_TIMEOUT_MS:3000}
spring.cloud.openfeign.client.config.default.readTimeout=${FEIGN_READ_TIMEOUT_MS:5000}

# Async AI index event dispatch
ai.indexing.dispatch.fixed-delay-ms=5000
ai.indexing.dispatch.batch-size=30
